version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: techfix_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: techfix_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PEPPER: ${PEPPER}
      NODE_ENV: ${NODE_ENV}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: techfix_frontend
    depends_on:
      - backend
  
  nginx:
    image: nginx:alpine
    container_name: techfix_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  migrator:
    build:
      context: ./backend
      target: builder
    command: ["pnpm", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  seeder:
    build:
      context: ./backend
      target: builder
    command: ["node", "dist/prisma/seed.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PEPPER: ${PEPPER}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed
    
volumes:
  pgdata: